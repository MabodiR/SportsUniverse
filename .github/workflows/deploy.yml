name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify server toolchain
        run: |
          php --version
          composer --version
          node --version
          npm --version

      - name: Install production dependencies
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
          npm ci --include=optional --no-audit --no-fund

      - name: Build frontend
        env:
          NODE_OPTIONS: --max-old-space-size=2048
        run: npm run build

      - name: Deploy application locally
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='database/*.sqlite*' \
            --exclude='mobile-app/' \
            --exclude='node_modules/' \
            --exclude='bootstrap/cache/' \
            --exclude='public/storage' \
            --exclude='storage/' \
            --exclude='tests/' \
            ./ /var/www/sportuniverse/

      - name: Prepare Laravel runtime
        env:
          PRODUCTION_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          cd /var/www/sportuniverse
          set_env() {
            key="$1"
            value="$2"
            sudo sed -i "/^${key}=/d" .env
            printf '%s=%s\n' "$key" "$value" | sudo tee -a .env > /dev/null
          }
          if [ -z "$PRODUCTION_MAIL_PASSWORD" ]; then
            echo "MAIL_PASSWORD is not configured in the GitHub production environment." >&2
            exit 1
          fi
          set_env DB_CONNECTION pgsql
          set_env DB_HOST /var/run/postgresql
          set_env DB_PORT 5432
          set_env DB_DATABASE sportuniverse
          set_env DB_USERNAME www-data
          set_env DB_PASSWORD ''
          set_env FILESYSTEM_DISK local
          set_env MEDIA_DISK local
          set_env MEDIA_REQUIRES_MODERATION false
          set_env MAIL_MAILER smtp
          set_env MAIL_SCHEME smtps
          set_env MAIL_HOST www116.jnb2.host-h.net
          set_env MAIL_PORT 465
          set_env MAIL_USERNAME support@sportsuniverse.co.za
          set_env MAIL_PASSWORD "$PRODUCTION_MAIL_PASSWORD"
          set_env MAIL_FROM_ADDRESS support@sportsuniverse.co.za
          set_env MAIL_FROM_NAME SportsUniverse
          set_env PAYFAST_ENABLED true
          set_env PAYFAST_SANDBOX true
          set_env PAYFAST_MERCHANT_ID 10000100
          set_env PAYFAST_MERCHANT_KEY 46f0cd694581a
          set_env PAYFAST_PASSPHRASE jt7NOE43FZPn
          set_env PAYFAST_VALIDATE_SERVER true
          set_env PAYFAST_VALIDATE_IP true
          sudo chown -R www-data:www-data storage bootstrap/cache
          sudo -u www-data php artisan optimize:clear

      - name: Prepare production PostgreSQL
        run: |
          if ! command -v psql > /dev/null; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y postgresql
          fi
          if ! php -m | grep -qi '^pdo_pgsql$'; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y php8.5-pgsql
          fi
          sudo systemctl enable --now postgresql
          sudo -u postgres createuser www-data 2>/dev/null || true
          sudo -u postgres createdb --owner=www-data sportuniverse 2>/dev/null || true
          sudo -u postgres psql --set ON_ERROR_STOP=1 --command 'ALTER DATABASE sportuniverse OWNER TO "www-data";'

      - name: Prepare production media runtime
        run: |
          if ! command -v ffmpeg > /dev/null || ! command -v ffprobe > /dev/null; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ffmpeg
          fi

      - name: Run production migrations
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan migrate --force

      - name: Seed production sports
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan db:seed --class=Database\\Seeders\\SportSeeder --force

      - name: Seed production membership plans
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan db:seed --class=Database\\Seeders\\SubscriptionPlanSeeder --force

      - name: Seed production feed
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan db:seed --class=Database\\Seeders\\FeedDemoSeeder --force

      - name: Seed production scale data
        continue-on-error: true
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan db:seed --class=Database\\Seeders\\SouthAfricaScaleSeeder --force

      - name: Optimize production application
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan storage:link --force
          sudo -u www-data php artisan optimize

      - name: Install production services
        run: |
          cd /var/www/sportuniverse
          sudo install -m 644 deploy/sportuniverse-queue.service /etc/systemd/system/sportuniverse-queue.service
          sudo install -m 644 deploy/php-upload.ini /etc/php/8.5/fpm/conf.d/99-sportuniverse-upload.ini
          sudo install -m 644 deploy/php-upload.ini /etc/php/8.5/cli/conf.d/99-sportuniverse-upload.ini
          sudo install -m 644 deploy/nginx.conf /etc/nginx/sites-available/sportuniverse
          sudo nginx -t
          sudo certbot --nginx \
            --non-interactive \
            --agree-tos \
            --register-unsafely-without-email \
            --redirect \
            --keep-until-expiring \
            --domain sportsuniverse.co.za \
            --domain www.sportsuniverse.co.za
          sudo systemctl daemon-reload
          sudo systemctl restart sportuniverse-queue.service sportuniverse-reverb.service
          sudo systemctl reload php8.5-fpm.service nginx.service

      - name: Verify production profile media storage
        run: |
          cd /var/www/sportuniverse
          printf 'profile-media-ok' | sudo -u www-data tee storage/app/public/deployment-storage-health.txt > /dev/null
          curl --fail --silent --show-error --header 'Host: sportsuniverse.co.za' http://127.0.0.1/storage/deployment-storage-health.txt | grep -q 'profile-media-ok'
          sudo -u www-data rm storage/app/public/deployment-storage-health.txt

      - name: Verify production health
        run: |
          curl --fail --silent --show-error --header 'Host: sportsuniverse.co.za' http://127.0.0.1/up > /dev/null
          curl --fail --silent --show-error --header 'Host: sportsuniverse.co.za' http://127.0.0.1/feed > /dev/null
