name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify server toolchain
        run: |
          php --version
          composer --version
          node --version
          npm --version

      - name: Install production dependencies
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
          npm ci --include=optional --no-audit --no-fund

      - name: Build frontend
        env:
          NODE_OPTIONS: --max-old-space-size=2048
        run: npm run build

      - name: Deploy application locally
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='database/*.sqlite*' \
            --exclude='mobile-app/' \
            --exclude='node_modules/' \
            --exclude='bootstrap/cache/' \
            --exclude='public/storage' \
            --exclude='storage/' \
            --exclude='tests/' \
            ./ /var/www/sportuniverse/

      - name: Prepare Laravel runtime
        run: |
          cd /var/www/sportuniverse
          if grep -q '^DB_CONNECTION=' .env; then
            sudo sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          else
            echo 'DB_CONNECTION=pgsql' | sudo tee -a .env > /dev/null
          fi
          sudo chown -R www-data:www-data storage bootstrap/cache
          sudo -u www-data php artisan optimize:clear

      - name: Verify production database
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan tinker --execute="throw_unless(config('database.default') === 'pgsql', new RuntimeException('Production must use PostgreSQL.'));"

      - name: Run production migrations
        run: |
          cd /var/www/sportuniverse
          sudo -u www-data php artisan migrate --force
          sudo -u www-data php artisan storage:link || true
          sudo -u www-data php artisan optimize

      - name: Install production services
        run: |
          cd /var/www/sportuniverse
          sudo install -m 644 deploy/sportuniverse-queue.service /etc/systemd/system/sportuniverse-queue.service
          sudo install -m 644 deploy/php-upload.ini /etc/php/8.5/fpm/conf.d/99-sportuniverse-upload.ini
          sudo install -m 644 deploy/php-upload.ini /etc/php/8.5/cli/conf.d/99-sportuniverse-upload.ini
          sudo install -m 644 deploy/nginx.conf /etc/nginx/sites-available/sportuniverse
          sudo nginx -t
          sudo certbot --nginx \
            --non-interactive \
            --agree-tos \
            --register-unsafely-without-email \
            --redirect \
            --keep-until-expiring \
            --domain sportsuniverse.co.za \
            --domain www.sportsuniverse.co.za
          sudo systemctl daemon-reload
          sudo systemctl restart sportuniverse-queue.service sportuniverse-reverb.service
          sudo systemctl reload php8.5-fpm.service nginx.service

      - name: Verify production health
        run: |
          curl --fail --silent --show-error http://127.0.0.1/up > /dev/null
          curl --fail --silent --show-error http://127.0.0.1/feed > /dev/null
